name: Build Android Code Studio

on:
  push:
    branches: 
      - "dev"
      - "main" 
      - "indexing"
      - "release/**"
    paths-ignore:
      - '**.md'
      - '**.json'
      - 'fastlane/**'
      - '.github/workflows/crowdin_contributors.yml'
  pull_request:
    branches: [ "dev" ]
    paths-ignore:
      - '**.md'
      - '**.json'
      - 'fastlane/**'
      - '.github/workflows/crowdin_contributors.yml'
  workflow_dispatch: { }

permissions:
  contents: write

jobs:
  build_release_apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Create local.properties
        run: |
          echo "signing.storeFile=signing/signing-key.jks" >> local.properties
          echo "signing.storePassword=123456" >> local.properties
          echo "signing.keyAlias=AndroidCS" >> local.properties
          echo "signing.keyPassword=123456" >> local.properties
      - name: Assemble Release APK
        env:
          SIGNING_STORE_PASSWORD: "123456"
          SIGNING_KEY_PASSWORD: "123456"
        run: ./gradlew :core:app:assembleRelease
      - name: Get version name
        id: version
        run: |
          VERSION=
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build.${{ github.run_number }}
          name: "v${{ steps.version.outputs.name }} (Build #${{ github.run_number }})"
          body: |
            **Automated release build (R8 minified)**
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Run: #${{ github.run_number }}
          draft: false
          prerelease: true
          files: |
            core/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
